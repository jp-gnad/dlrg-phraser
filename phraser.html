<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src https://dlrg-results.jp-gnad.workers.dev; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'"
  >
  <title>DLRG Phraser</title>
  <link rel="stylesheet" href="phraser.css?v=20260617-1">
  <script defer src="phraser.js?v=20260616-2"></script>
</head>
<body class="auth-locked">
  <section id="loginScreen" class="login-screen" aria-labelledby="loginTitle">
    <form id="loginForm" class="login-card">
      <p class="eyebrow">DLRG Phraser</p>
      <h1 id="loginTitle">Zugang erforderlich</h1>
      <p class="login-hint">Bitte gib das aktuelle Passwort ein.</p>

      <label class="visually-hidden" for="username">Benutzername</label>
      <input
        id="username"
        class="visually-hidden"
        name="username"
        type="text"
        value="DLRG Phraser"
        autocomplete="username"
        tabindex="-1"
        aria-hidden="true"
      >

      <label for="password">Passwort</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      >

      <button type="submit">Anmelden</button>
      <p id="loginError" class="login-error" role="alert" aria-live="polite"></p>
    </form>
  </section>

  <main id="app" hidden>
    <section class="card">
      <div class="heading-row">
        <div>
          <p class="eyebrow">DLRG Phraser</p>
          <h1 id="pageTitle">Wettkampfergebnisse</h1>
        </div>
        <div class="header-actions">
          <a class="secondary-link" href="live-check.html">Live-ID prüfen</a>
          <button id="logoutButton" class="secondary-button" type="button">
            Abmelden
          </button>
        </div>
      </div>

      <div class="controls">
        <div class="competition-control">
          <label for="competitionSelect">Wettkampf</label>
          <select id="competitionSelect" disabled>
            <option value="">Wettkämpfe werden geladen ...</option>
          </select>
          <p id="competitionListInfo" class="field-hint" aria-live="polite"></p>
          <button
            id="reloadCompetitionListButton"
            class="link-button"
            type="button"
            hidden
          >
            Wettkampfliste erneut laden
          </button>

          <div id="manualCompetitionGroup" class="manual-competition" hidden>
            <label for="competition">Wettkampfcode manuell eingeben</label>
            <input
              id="competition"
              type="text"
              autocomplete="off"
              spellcheck="false"
            >
          </div>
        </div>

      </div>

      <section
        id="resultSelection"
        class="result-selection"
        aria-labelledby="resultSelectionTitle"
        hidden
      >
        <div class="selection-heading">
          <div>
            <h2 id="resultSelectionTitle">Ergebnislisten auswählen</h2>
            <p class="field-hint">
              Vorlauf, Zwischenläufe und Finale werden getrennt geladen.
            </p>
          </div>
          <p id="selectionInfo" class="selection-info" aria-live="polite"></p>
        </div>

        <div id="resultTabs" class="result-tabs" role="tablist">
          <button
            class="result-tab"
            type="button"
            role="tab"
            data-event-type="Individual"
          >
            Einzel
          </button>
          <button
            class="result-tab"
            type="button"
            role="tab"
            data-event-type="Team"
          >
            Mannschaft
          </button>
        </div>

        <div id="resultCatalog" class="result-catalog"></div>
      </section>

      <div id="status" class="status" role="status" aria-live="polite">Bereit.</div>

      <div class="table-wrapper">
        <table id="resultTable"></table>
      </div>

      <details id="errorDetails" hidden>
        <summary>Übersprungene Ergebnislisten anzeigen</summary>
        <pre id="errorOutput"></pre>
      </details>
    </section>
  </main>
</body>
</html>
